modules:
  jira:issuePanel:
    - key: kpi-issue-panel
      resource: issue-panel
      resolver:
        function: resolver
      title: KPIs
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  jira:globalPage:
    - key: kpi-timeline-page
      resource: timeline
      resolver:
        function: resolver
      title: KPI Timeline
      layout: native
  jira:adminPage:
    - key: kpi-settings-page
      resource: settings
      resolver:
        function: resolver
      title: KPI Settings
      layout: blank
  jira:entityProperty:
    - key: kpi-index
      entityType: issue
      propertyKey: kpi-assignments
      values:
        - path: kpiIds
          type: text
          searchAlias: kpiIds
  jira:customField:
    - key: kpi-reading
      name: KPI Reading
      description: >-
        Append-only KPI reading value (app-managed). Each recorded value is an
        embedded-date entry; the reading series is reconstructed from this
        field's changelog (storage-model.md, Option B).
      type: string
      readOnly: true
  function:
    - key: resolver
      handler: index.handler

resources:
  - key: issue-panel
    path: static/issue-panel/build
  - key: timeline
    path: static/timeline/build
  - key: settings
    path: static/settings/build

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app
    # Writing the app-managed KPI Reading field via the app custom field value
    # API (PUT /rest/api/3/app/field/{id}/value). Docs list this as currently
    # optional but recommended and eventually mandatory. Adding a scope requires
    # `forge install --upgrade` on next deploy.
    - write:app-data:jira
    # KPI-space provisioning (Settings → Create space): create the project and
    # provision/associate the `KPI` issue type + scheme.
    - manage:jira-project
    - manage:jira-configuration

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/f92bb5d3-136d-4f6d-9245-fc31f4e8fdec

# id assigned by `forge register` (deferred until a dev site is provisioned).
