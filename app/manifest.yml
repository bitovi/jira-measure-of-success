modules:
  jira:issuePanel:
    - key: kpi-issue-panel
      resource: issue-panel
      resolver:
        function: resolver
      title: KPIs
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  jira:projectPage:
    - key: kpi-timeline-page
      resource: timeline
      resolver:
        function: resolver
      title: KPI Timeline
  jira:adminPage:
    - key: kpi-settings-page
      resource: settings
      resolver:
        function: resolver
      title: KPI Settings
  jira:entityProperty:
    - key: kpi-index
      entityType: issue
      propertyKey: kpi-assignments
      values:
        - path: kpiIds
          type: text
          searchAlias: kpiIds
  jira:customField:
    - key: kpi-reading
      name: KPI Reading
      description: >-
        Append-only KPI reading value (app-managed). Each recorded value is an
        embedded-date entry; the reading series is reconstructed from this
        field's changelog (storage-model.md, Option B).
      type: string
      readOnly: true
  function:
    - key: resolver
      handler: index.handler

resources:
  - key: issue-panel
    path: static/issue-panel/build
  - key: timeline
    path: static/timeline/build
  - key: settings
    path: static/settings/build

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/f92bb5d3-136d-4f6d-9245-fc31f4e8fdec

# id assigned by `forge register` (deferred until a dev site is provisioned).
